name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Unit tests
        run: go test ./...
      - name: Vet
        run: go vet ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Race tests
        run: go test -race ./...

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orm
          POSTGRES_PASSWORD: orm
          POSTGRES_DB: orm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orm -d orm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Postgres integration tests
        env:
          ORM_TEST_POSTGRES_DSN: postgres://orm:orm@localhost:5432/orm?sslmode=disable
        run: go test ./... -run '^TestIntegrationPostgres'
