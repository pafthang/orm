name: perf

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench-assert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Benchmark assertions
        run: ./scripts/bench-assert.sh
