name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orm
          POSTGRES_PASSWORD: orm
          POSTGRES_DB: orm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orm -d orm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ./...
      - name: Postgres integration tests
        env:
          ORM_TEST_POSTGRES_DSN: postgres://orm:orm@localhost:5432/orm?sslmode=disable
        run: go test ./... -run '^TestIntegrationPostgres'

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
